packages:
  - "packages/*"

# Single source of truth for shared dependency versions across the monorepo.
# Packages reference these with "catalog:".
catalog:
  # Lint / format / tooling
  "@eslint/js": ^9.17.0
  "@types/node": ^22.10.0
  eslint: ^9.17.0
  eslint-config-prettier: ^9.1.0
  prettier: ^3.4.0
  typescript: ^5.7.0
  typescript-eslint: ^8.18.0

  # React
  "@types/react": ^19.0.0
  "@types/react-dom": ^19.0.0
  react: ^19.0.0
  react-dom: ^19.0.0

  # Styling
  tailwindcss: ^4.0.0

  # Testing
  vitest: ^2.1.0

# Allow these dependencies' install scripts to run (pnpm 10 blocks by default).
# esbuild fetches its platform binary (needed by vitest/tsx).
onlyBuiltDependencies:
  - esbuild
