packages:
  - "apps/*"
  - "packages/*"

# Single source of truth for shared dependency versions across the monorepo.
# Packages reference these with "catalog:".
catalog:
  # React / Next
  "@auth/drizzle-adapter": ^1.7.0
  "@eslint/js": ^9.17.0
  "@playwright/test": ^1.49.0
  "@simplewebauthn/browser": ^13.0.0
  "@simplewebauthn/server": ^13.0.0
  "@tailwindcss/postcss": ^4.0.0
  "@types/node": ^22.10.0
  "@types/react": ^19.0.0
  "@types/react-dom": ^19.0.0
  "@vitest/coverage-v8": ^2.1.0
  drizzle-kit: ^0.30.0

  # Data layer
  drizzle-orm: ^0.38.0

  # Lint / format
  eslint: ^9.17.0
  eslint-config-prettier: ^9.1.0

  # Jobs
  inngest: ^3.54.2
  next: ^15.1.0

  # Auth
  next-auth: 5.0.0-beta.25

  # i18n
  next-intl: ^3.26.0
  postgres: ^3.4.5
  prettier: ^3.4.0
  react: ^19.0.0
  react-dom: ^19.0.0

  # Styling
  tailwindcss: ^4.0.0

  # Language / tooling
  typescript: ^5.7.0
  typescript-eslint: ^8.18.0

  # Testing
  vitest: ^2.1.0
  zod: ^3.24.0

# Allow these dependencies' install scripts to run (pnpm 10 blocks by default).
# esbuild fetches its platform binary (needed by vitest/tsx/drizzle-kit);
# sharp builds Next.js image optimization.
onlyBuiltDependencies:
  - esbuild
  - sharp
